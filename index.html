<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>716 Cyber Security | المنظومة الأمنية</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 3D Space Background -->
    <div id="canvas-container"></div>

    <!-- Global HUD Navigation -->
    <nav class="hud-nav">
        <div class="logo" onclick="app.navigate('home')">
            <div class="logo-icon">716</div>
            <div class="logo-text"><span>716</span> CYBER</div>
        </div>
        <button class="back-btn" id="backBtn" onclick="app.navigate('home')">
            <span class="iconify" data-icon="lucide:arrow-right"></span> الرئيسية
        </button>
    </nav>

    <div id="toast-container"></div>

    <!-- VIEW: HOME (The Command Center) -->
    <section id="view-home" class="view active">
        <div class="hero">
            <h1 class="text-gradient">COSMIC<br>SECURITY HUB</h1>
            <p class="text-gray-400">اختر الوحدة المطلوبة للبدء في العمليات السيبرانية</p>
        </div>

        <div class="tools-grid">
            <!-- Planet 1: Signal -->
            <div class="card-3d" onclick="app.navigate('signal')">
                <span class="card-icon">🔐</span>
                <h2 class="card-title">716 SIGNAL</h2>
                <p class="card-desc">وحدة التشفير الكمي. حماية البيانات بمعيار AES-256-GCM.</p>
            </div>
            <!-- Planet 2: Sentinel -->
            <div class="card-3d" onclick="app.navigate('sentinel')">
                <span class="card-icon">🛡️</span>
                <h2 class="card-title">716 SENTINEL</h2>
                <p class="card-desc">وحدة التحليل الهجومي. كشف الثغرات واستخراج الـ Payloads.</p>
            </div>
        </div>
    </section>

    <!-- VIEW: SIGNAL (Encryption Tool) -->
    <section id="view-signal" class="view">
        <div class="tool-container">
            <h1 class="tool-title">716 SIGNAL</h1>
            <div class="glass-panel">
                <div class="mode-switcher">
                    <div class="mode-slider" id="sig-slider"></div>
                    <button class="mode-btn active" id="sig-enc-btn" onclick="SignalApp.setMode('encrypt')">تشفير</button>
                    <button class="mode-btn" id="sig-dec-btn" onclick="SignalApp.setMode('decrypt')">فك التشفير</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label class="input-label">المفتاح السري</label>
                        <input type="password" id="sig-key" class="field font-fira" placeholder="Enter Master Key...">
                        
                        <label class="input-label">النص</label>
                        <textarea id="sig-text" class="field font-fira" rows="6" placeholder="Type text here..."></textarea>
                        
                        <button onclick="SignalApp.process()" id="sig-action-btn" class="btn-main btn-primary">تشفير النص</button>
                    </div>
                    <div class="space-y-4">
                        <label class="input-label">النتيجة</label>
                        <textarea id="sig-result" class="field font-fira" rows="10" readonly placeholder="Result..."></textarea>
                        <button onclick="SignalApp.copyResult()" class="btn-sec w-full">نسخ النتيجة</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- VIEW: SENTINEL (Scanner Tool) -->
    <section id="view-sentinel" class="view">
        <div class="tool-container">
            <h1 class="tool-title text-red-500">716 SENTINEL</h1>
            <div class="glass-panel">
                <div class="scanner-grid">
                    <div class="editor-side">
                        <div class="flex justify-between items-center mb-2">
                            <label class="input-label">محرر الكود</label>
                            <button onclick="SentinelApp.loadDemo()" class="text-xs text-blue-400 underline">تحميل مثال</button>
                        </div>
                        <textarea id="sen-input" class="code-editor font-fira" placeholder="// Paste code here..."></textarea>
                        <button onclick="SentinelApp.analyze()" class="btn-main btn-danger mt-4">ابدأ الفحص العميق</button>
                    </div>
                    <div class="results-side">
                        <label class="input-label">النتائج</label>
                        <div id="sen-results" class="results-area">
                            <p class="text-gray-600 text-center mt-20">بانتظار الكود...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Logic Files -->
    <script src="js/signal.js"></script>
    <script src="js/sentinel.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
